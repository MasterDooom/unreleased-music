<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Girl - Unreleased Archive</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="dark-theme">
  <header class="artist-header">
    <h1>TV Girl</h1>
    <a href="../index.html" class="back-link">&#8592; Back to Artists</a>
  </header>
  <section class="discography-section">
    <h2>Discography</h2>
    <div class="albums-list">
      <div class="album-block" onclick="toggleTracklist(this)">
        <img src="https://upload.wikimedia.org/wikipedia/en/7/7c/TV_Girl_-_French_Exit.png" alt="French Exit Album Cover" class="album-cover">
        <div class="album-info">
          <span class="album-title">French Exit (Unreleased)</span>
          <span class="album-year">2024</span>
          <span class="album-tracks">6 tracks</span>
        </div>
        <div class="tracklist" style="display:none;">
          <table class="tracklist-table">
            <thead>
              <tr><th>#</th><th>Title</th><th>Length</th><th></th></tr>
            </thead>
            <tbody>
              <tr><td>1</td><td>Lovers Rock (Demo)</td><td>3:11</td><td><button class="play-btn"></button></td></tr>
              <tr><td>2</td><td>Birds (Unreleased)</td><td>2:58</td><td><button class="play-btn"></button></td></tr>
              <tr><td>3</td><td>Hate Yourself (Demo)</td><td>3:22</td><td><button class="play-btn"></button></td></tr>
              <tr><td>4</td><td>She Smokes in Bed (Demo)</td><td>3:05</td><td><button class="play-btn"></button></td></tr>
              <tr><td>5</td><td>Not Allowed (Demo)</td><td>2:49</td><td><button class="play-btn"></button></td></tr>
              <tr><td>6</td><td>Pretty Boys (Demo)</td><td>3:14</td><td><button class="play-btn"></button></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </section>
  <script src="../assets/js/main.js"></script>
  <script>
    function toggleTracklist(albumBlock) {
      const tracklist = albumBlock.querySelector('.tracklist');
      tracklist.style.display = tracklist.style.display === 'none' ? 'block' : 'none';
    }
  </script>
</body>
</html>
