<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billie Eilish - Unreleased Archive</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="dark-theme">
  <header class="artist-header">
    <h1>Billie Eilish</h1>
    <a href="../index.html" class="back-link">&#8592; Back to Artists</a>
  </header>
  <section class="discography-section">
    <h2>Discography</h2>
    <div class="albums-list">
      <div class="album-block" onclick="toggleTracklist(this)">
        <img src="../assets/images/billie-eilish-album.jpg" alt="Album Cover" class="album-cover">
        <div class="album-info">
          <span class="album-title">Happier Than Ever (Alt)</span>
          <span class="album-year">2022</span>
          <span class="album-tracks">7 tracks</span>
        </div>
        <div class="tracklist" style="display:none;">
          <table class="tracklist-table">
            <thead>
              <tr><th>#</th><th>Title</th><th>Length</th><th></th></tr>
            </thead>
            <tbody>
              <tr><td>1</td><td>Happier Than Ever (Demo)</td><td>3:45</td><td><button class="play-btn"></button></td></tr>
              <tr><td>2</td><td>Lost Cause (Unreleased)</td><td>3:12</td><td><button class="play-btn"></button></td></tr>
              <tr><td>3</td><td>Oxytocin (Alt)</td><td>2:58</td><td><button class="play-btn"></button></td></tr>
              <tr><td>4</td><td>TV (Demo)</td><td>3:21</td><td><button class="play-btn"></button></td></tr>
              <tr><td>5</td><td>Male Fantasy (Demo)</td><td>3:05</td><td><button class="play-btn"></button></td></tr>
              <tr><td>6</td><td>Billie Bossa Nova (Alt)</td><td>2:54</td><td><button class="play-btn"></button></td></tr>
              <tr><td>7</td><td>Getting Older (Demo)</td><td>3:33</td><td><button class="play-btn"></button></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </section>
  <script src="../assets/js/main.js"></script>
  <script>
    function toggleTracklist(albumBlock) {
      const tracklist = albumBlock.querySelector('.tracklist');
      tracklist.style.display = tracklist.style.display === 'none' ? 'block' : 'none';
    }
  </script>
</body>
</html>
